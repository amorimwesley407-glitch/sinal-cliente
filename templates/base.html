<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monitoramento NOC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="{{ url_for('dashboard.dashboard') }}">
        <span class="brand-mark"></span>
        <span>
          <strong>Sinal IXC</strong>
          <small>NOC Preventivo</small>
        </span>
      </a>
      <nav class="nav-stack">
        <a href="{{ url_for('dashboard.dashboard') }}">Dashboard</a>
        <a href="{{ url_for('dashboard.clientes_criticos') }}">Críticos</a>
        <a href="{{ url_for('dashboard.clientes_atencao') }}">Atenção</a>
        <a href="{{ url_for('dashboard.clientes_bons') }}">Bom</a>
        <a href="{{ url_for('dashboard.clientes_excelentes') }}">Excelente</a>
        <a href="{{ url_for('dashboard.offiline') }}">Offiline</a>
      </nav>
      <div class="sidebar-actions">
        <a href="{{ url_for('dashboard.exportar', formato='csv') }}">CSV</a>
        <a href="{{ url_for('dashboard.exportar', formato='xlsx') }}">Excel</a>
      </div>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <div>
          <span class="eyebrow">Operação de fibra</span>
          <h1>{% block page_title %}Dashboard{% endblock %}</h1>
        </div>
        <div class="topbar-status">
          <span class="status-dot"></span>
          <span>IXC Online</span>
        </div>
      </header>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
